services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: medusa
      POSTGRES_USER: medusa
      POSTGRES_PASSWORD: medusa
    ports:
      - "5433:5432"
    volumes:
      - medusa_pgdata:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U medusa -d medusa"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: .
      dockerfile: docker/Dockerfile.backend
      shm_size: '2gb'
    env_file:
      - .env
    environment:
      DATABASE_URL: postgres://medusa:medusa@postgres:5432/medusa
      JWT_SECRET: medusa-temple-secret-change-me
      ADMIN_EMAIL: oracle@medusa.ctf
      ADMIN_PASSWORD: change-me-now
      CORS_ORIGIN: http://localhost:3000
      NODE_ENV: production
      PORT: 4000
    ports:
      - "4000:4000"
    extra_hosts:
      - "oracle.medusa.internal:127.0.0.1"
      - "mirror.medusa.internal:127.0.0.1"
      - "treasury.medusa.internal:127.0.0.1"
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: .
      dockerfile: docker/Dockerfile.frontend
      shm_size: '2gb'
      args:
        NEXT_PUBLIC_API_URL: http://localhost/api
    env_file:
      - .env
    environment:
      NEXT_PUBLIC_API_URL: http://localhost/api
      NODE_ENV: production
    ports:
      - "3000:3000"
    depends_on:
      - backend

  nginx:
    image: nginx:1.27-alpine
    ports:
      - "80:80"
    depends_on:
      - frontend
      - backend
    volumes:
      - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf:ro

volumes:
  medusa_pgdata:
